<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Студенты</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<h2 class="mb-4">Список студентов</h2>

<div class="mb-3">
    <span class="badge bg-secondary">Логин: user/password или admin/password</span>
    <a class="btn btn-outline-secondary btn-sm ms-2" th:href="@{/logout}">Выйти</a>
</div>

<!-- ЗАДАНИЕ part4_2: объясните th:object и th:field в answers/part4_thymeleaf.md. -->
<!-- ▼ ВАШ КОД ЗДЕСЬ ▼ -->
<form th:action="@{/students/save}" th:object="${student}" method="post" class="row g-2 mb-4">
    <div class="col-md-4">
        <input type="text" th:field="*{name}" class="form-control" placeholder="Имя" required>
    </div>
    <div class="col-md-4">
        <input type="text" th:field="*{surname}" class="form-control" placeholder="Фамилия" required>
    </div>
    <div class="col-md-4">
        <button type="submit" class="btn btn-primary">Добавить</button>
    </div>
</form>
<!-- ▲ КОНЕЦ ВАШЕГО КОДА ▲ -->

<table class="table table-striped table-bordered align-middle">
    <thead>
    <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Фамилия</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <!-- ЗАДАНИЕ part4_2: выведите строки из ${students} и создайте ссылку удаления. -->
    <!-- ▼ ВАШ КОД ЗДЕСЬ ▼ -->
    <tr th:each="s : ${students}">
        <td th:text="${s.id}">1</td>
        <td th:text="${s.name}">Sash</td>
        <td th:text="${s.surname}">Brown</td>
        <td>
            <a th:href="@{/students/delete/{id}(id=${s.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Удалить?')">Удалить</a>
        </td>
    </tr>
    <!-- ▲ КОНЕЦ ВАШЕГО КОДА ▲ -->
    </tbody>
</table>

</body>
</html>
